<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><title>Login — ProdukAPI</title>
<style>body{font-family:Arial;max-width:400px;margin:60px auto}
input{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
button{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}</style>
</head><body>
<h2>Login</h2>
<form id="f">
  <input id="username" placeholder="Username" required>
  <input id="password" type="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>
<p>Belum punya akun? <a href="/register.html">Daftar</a></p>
<script>
document.getElementById('f').onsubmit = async (e) => {
  e.preventDefault();
  const body = {
    username: document.getElementById('username').value,
    password: document.getElementById('password').value
  };
  const res = await fetch('/api/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('jwt_token', data.token);
    window.location.href = '/dashboard.html';
  } else { alert(data.message); }
};
</script>
</body></html>
